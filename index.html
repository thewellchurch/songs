let currentSort = "last_used";
let openUuid = null;
const $ = s => document.querySelector(s);
function fmt(iso){ if(!iso) return null; const d=new Date(iso); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function ago(d){ if(d==null) return ""; if(d===0) return "today"; if(d===1) return "yesterday"; if(d<31) return d+" days ago"; if(d<365) return Math.round(d/30)+" months ago"; return (d/365).toFixed(1)+" years ago"; }
function esc(t){ return (t||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const SORTS = {
  least_used:(a,b)=>a.total_uses-b.total_uses||a.name.localeCompare(b.name),
  most_used:(a,b)=>b.total_uses-a.total_uses||a.name.localeCompare(b.name),
  last_used:(a,b)=>(a.days_since_last==null?1e9:a.days_since_last)-(b.days_since_last==null?1e9:b.days_since_last)||a.name.localeCompare(b.name),
  oldest_used:(a,b)=>(b.days_since_last==null?-1:b.days_since_last)-(a.days_since_last==null?-1:a.days_since_last)||a.name.localeCompare(b.name),
  this_year:(a,b)=>b.uses_this_year-a.uses_this_year||a.name.localeCompare(b.name),
  last_90:(a,b)=>b.uses_last_90-a.uses_last_90||a.name.localeCompare(b.name),
};
function render(){
  const q=$("#q").value.trim().toLowerCase();
  let rows=SONGS.filter(r=>!q||r.name.toLowerCase().includes(q));
  if(currentSort==="never_used"){ rows=rows.filter(r=>r.total_uses===0).sort((a,b)=>a.name.localeCompare(b.name)); }
  else rows=rows.slice().sort(SORTS[currentSort]);
  const tb=$("#rows"); tb.innerHTML="";
  if(!rows.length){ tb.innerHTML='<tr><td colspan="7" class="muted" style="padding:30px;text-align:center">No songs.</td></tr>'; return; }
  for(const r of rows){
    const tr=document.createElement("tr");
    const last=r.last_played?`${fmt(r.last_played)} <span class="muted">- ${ago(r.days_since_last)}</span>`:'<span class="never">never sung</span>';
    tr.innerHTML=`<td><span class="song">${esc(r.name)}</span>${r.library?` <span class="lib">${esc(r.library)}</span>`:""}</td>`+
      `<td class="num"><span class="pill ${r.total_uses?'':'zero'}">${r.total_uses}</span></td>`+
      `<td>${last}</td>`+
      `<td>${r.previous_played?fmt(r.previous_played):'<span class="muted">—</span>'}</td>`+
      `<td class="num">${r.gap_days!=null?r.gap_days+'d':'<span class="muted">—</span>'}</td>`+
      `<td class="num">${r.uses_last_90}</td><td class="num">${r.uses_this_year}</td>`;
    tr.onclick=()=>toggle(r.uuid,tr);
    tb.appendChild(tr);
    if(r.uuid===openUuid) detail(r,tr);
  }
}
function toggle(uuid,tr){
  if(openUuid===uuid){ openUuid=null; const n=tr.nextElementSibling; if(n&&n.classList.contains("detail"))n.remove(); return; }
  document.querySelectorAll("tr.detail").forEach(e=>e.remove());
  openUuid=uuid; const r=SONGS.find(s=>s.uuid===uuid); detail(r,tr);
}
function detail(r,tr){
  if(tr.nextElementSibling&&tr.nextElementSibling.classList.contains("detail"))return;
  const plays=HISTORY[r.uuid]||[];
  const items=plays.length?plays.map(p=>`<li>${fmt(p.played_at)}${p.service?` <span class="svc">— ${esc(p.service)}</span>`:""}</li>`).join(""):'<li class="muted">No recorded uses yet.</li>';
  const det=document.createElement("tr"); det.className="detail";
  det.innerHTML=`<td colspan="7"><div class="hist"><h4>${esc(r.name)} — full history (${plays.length})</h4><ol>${items}</ol></div></td>`;
  tr.after(det);
}
function services(){
  const box=$("#services");
  if(!SERVICES.length){ box.innerHTML='<div class="muted" style="padding:14px 0">No services recorded yet.</div>'; return; }
  box.innerHTML=SERVICES.map(s=>`<div class="svc-card"><div class="when">${esc(s.label||fmt(s.started_at))}</div><div class="list">${s.songs.length?s.songs.map(esc).join(" · "):"<em>no songs logged</em>"}</div></div>`).join("");
}
$("#seg").onclick=e=>{ const b=e.target.closest("button"); if(!b)return; $("#seg").querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); currentSort=b.dataset.sort; openUuid=null; render(); };
$("#q").oninput=render;
render(); services();
</script>
